<!doctype html>
<html lang="en">
  <head>
    <title>Product Inventory</title>
    <link rel="stylesheet" href="Lab6.css" />
  </head>
  <body>
    <h2>Inventory Managment System</h2>

    <form id="productForm">
      <input type="text" id="productName" placeholder="Product Name" />
      <input type="text" id="productPrice" placeholder="Price" />
      <input type="text" id="productStock" placeholder="Stock Quality" />
      <button type="submit">Add Product</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Item Name</th>
          <th>Price</th>
          <th>Stock</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <script src="reponse.js"></script>
  </body>
</html>
